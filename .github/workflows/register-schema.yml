name: Register Schema
on:
  workflow_dispatch:
    inputs:
      magento_version:
        description: 'Magento version'
        required: true
        default: '2.4.6'
      php_version:
        description: 'PHP version'
        required: true
        default: '8.1'
      composer_version:
        description: 'Composer version'
        required: true
        default: 'composer:v2'
      mysql_version:
        description: 'Mysql version'
        required: true
        default: '8.0'

jobs:
  register-schema:
    name: Register Magento 2 GraphQL Schema
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:${{ github.event.inputs.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: 123123q
          MYSQL_DATABASE: magento
        ports:
          - 3306:3306
        options: --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      elasticsearch:
        image: docker.io/wardenenv/elasticsearch:7.6
        ports:
          - 9200:9200
          - 9300:9300
        env:
          "discovery.type": single-node
        options: --health-cmd="curl localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s" --health-interval=10s --health-timeout=5s --health-retries=3
      rabbitmq:
        image: rabbitmq:3.8
        ports:
          - 5672:5672
        options: --health-cmd="rabbitmq-diagnostics check_port_connectivity" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php_version }}
          extensions: "bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, xsl, zip, sockets, mcrypt"
          tools: ${{ github.event.inputs.composer_version }}
      - name: Create empty composer project
        run: |
          echo ${{ secrets.AUTH_JSON }} >> auth.json
          composer init -n --name reach-digital/register-schema --require magento/product-community-edition:${{ github.event.inputs.magento_version }}
          composer config repositories.magento '{"type": "composer", "url": "https://repo.magento.com/"}'
          composer config --no-plugins allow-plugins.magento/composer-dependency-version-audit-plugin true
          composer config --no-plugins allow-plugins.magento/inventory-composer-installer true
          composer config --no-plugins allow-plugins.magento/magento-composer-installer true
          composer config --no-plugins allow-plugins.laminas/laminas-dependency-plugin true
          composer config --no-plugins allow-plugins.yireo/magento2-replace-tools true
          sed -i '$ s/.$//' composer.json
          echo ',"replace":{"magento/module-bundle-sample-data": "*","magento/module-catalog-rule-sample-data": "*","magento/module-catalog-sample-data": "*","magento/module-cms-sample-data": "*","magento/module-configurable-sample-data": "*","magento/module-customer-sample-data": "*","magento/module-downloadable-sample-data": "*","magento/module-grouped-product-sample-data": "*","magento/module-msrp-sample-data": "*","magento/module-offline-shipping-sample-data": "*","magento/module-product-links-sample-data": "*","magento/module-review-sample-data": "*","magento/module-sales-rule-sample-data": "*","magento/module-sales-sample-data": "*","magento/module-sample-data": "*","magento/module-swatches-sample-data": "*","magento/module-tax-sample-data": "*","magento/module-theme-sample-data": "*","magento/module-widget-sample-data": "*","magento/module-wishlist-sample-data": "*","magento/sample-data-media": "*","amzn/amazon-pay-and-login-magento-2-module":"*","amzn/amazon-pay-and-login-with-amazon-core-module": "*","amzn/amazon-pay-module": "*","amzn/amazon-pay-sdk-php": "*","amzn/login-with-amazon-module": "*","magento/module-braintree": "*","magento/module-braintree-graph-ql": "*","braintree/braintree_php": "*","braintree/braintree": "*","dotmailer/dotmailer-magento2-extension": "*","dotmailer/dotmailer-magento2-extension-package": "*","dotmailer/dotmailer-magento2-extension-enterprise": "*","dotmailer/dotmailer-magento2-extension-enterprise-package": "*","dotmailer/dotmailer-magento2-extension-chat": "*","dotmailer/dotmailer-magento2-extension-b2b": "*","dotmailer/dotmailer-magento2-extension-sms": "*","klarna/m2-payments": "*","klarna/module-core": "*","klarna/module-kp": "*","klarna/module-kp-graph-ql": "*","klarna/module-ordermanagement": "*","klarna/module-onsitemessaging": "*","paypal/module-braintree": "*","paypal/module-braintree-core": "*","paypal/module-braintree-graph-ql": "*","temando/module-shipping": "*","temando/module-shipping-m2": "*","vertex/product-magento-module": "*","vertex/module-tax": "*","vertex/sdk": "*","vertexinc/module-tax-staging": "*","vertexinc/product-magento-module": "*","vertexinc/product-magento-module-commerce": "*","vertex/module-address-validation": "*","vertex/module-tax-staging": "*","yotpo/magento2-module-yotpo-reviews": "*","yotpo/magento2-module-yotpo-reviews-bundle": "*"},"autoload":{"files": ["app/etc/NonComposerComponentRegistration.php"],"psr-0": {"": ["app/code/","generated/code/"]},"psr-4":{"Magento\\":"app/code/Magento/","Magento\\Framework\\": "lib/internal/Magento/Framework/","Magento\\Setup\\": "setup/src/Magento/Setup/", "Zend\\Mvc\\Controller\\": "setup/src/Zend/Mvc/Controller/"},"psr-0": {"": ["app/code/"]}}}' >> composer.json
          composer install
#          composer require yireo/magento2-replace-tools --dev --with-all-dependencies
#          composer replace:bulk:add yireo/magento2-replace-bundled
#          composer replace:bulk:add yireo/magento2-replace-sample-data
#          composer replace:build
#          composer update --lock
      - name: Install Magento
        run: |
          php bin/magento setup:install --cleanup-database --backend-frontname=admin --amqp-host=localhost --amqp-port=5672 --amqp-user=guest --amqp-password=guest  --db-host=127.0.0.1 --db-name=magento --db-user=root --db-password=123123q --session-save=files --admin-user=admin --admin-password=Welkom1234 --admin-email=admin@test.com --admin-firstname=Admin --admin-lastname=Admin --search-engine=elasticsearch7 --elasticsearch-host=localhost --elasticsearch-port=9200 --magento-init-params="MAGE_MODE=developer"
          php bin/magento reach-digital:get-graphql-schema
          ls .
          cat schema.graphql
      - name: Publish schema
        run: |
          npm i -g -D @graphql-hive/cli
          hive schema:publish --commit=${{ github.event.inputs.magento_version }} --registry.accessToken ${{secrets.HIVE_ACCESS_TOKEN_CLEAN}} schema.graphql