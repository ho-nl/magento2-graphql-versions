name: Register Schema
on:
  workflow_dispatch:
    inputs:
      magento_version:
        description: 'Package version to install'
        required: true
        default: '2.4.6'
      composer_package:
        description: 'Distribution metapackage'
        required: true
        default: 'magento/product-community-edition'
      composer_repo:
        description: 'Composer repository URL'
        required: true
        default: 'https://repo.magento.com/'
      label:
        description: 'Commit message / tag (defaults to magento_version; e.g. mage-os-3.2.0)'
        required: false
        default: ''
      php_version:
        description: 'PHP version'
        required: true
        default: '8.1'
      composer_version:
        description: 'Composer version'
        required: true
        default: 'composer:v2'
      mysql_version:
        description: 'Mysql version'
        required: true
        default: '8.0'
      search_engine:
        description: 'Search engine (elasticsearch7 or opensearch; Magento 2.4.8+ requires opensearch)'
        required: true
        default: 'elasticsearch7'
      search_image:
        description: 'Search engine Docker image'
        required: true
        default: 'docker.io/wardenenv/elasticsearch:7.6'

jobs:
  register-schema:
    name: Register Magento 2 GraphQL Schema
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      mysql:
        image: mysql:${{ github.event.inputs.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: 123123q
          MYSQL_DATABASE: magento
        ports:
          - 3306:3306
        options: --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      search:
        image: ${{ github.event.inputs.search_image }}
        ports:
          - 9200:9200
          - 9300:9300
        env:
          "discovery.type": single-node
          # Only used by OpenSearch images; harmless for Elasticsearch
          DISABLE_SECURITY_PLUGIN: "true"
          DISABLE_INSTALL_DEMO_CONFIG: "true"
        options: --health-cmd="curl localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s" --health-interval=10s --health-timeout=5s --health-retries=3
      rabbitmq:
        image: rabbitmq:3.8
        ports:
          - 5672:5672
        options: --health-cmd="rabbitmq-diagnostics check_port_connectivity" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php_version }}
          extensions: "bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, xsl, zip, sockets, mcrypt"
          tools: ${{ github.event.inputs.composer_version }}
      - name: Create empty composer project
        run: |
          echo ${{ secrets.AUTH_JSON }} >> auth.json
          composer init -n --name reach-digital/register-schema --require ${{ github.event.inputs.composer_package }}:${{ github.event.inputs.magento_version }}
          composer config repositories.dist '{"type": "composer", "url": "${{ github.event.inputs.composer_repo }}"}'
          # Throwaway CI install; Mage-OS ships the same plugins under renamed packages, so allow all
          composer config --no-plugins allow-plugins true
          # Some Mage-OS releases require dev-stability packages (e.g. phpmd/phpmd 3.x-dev in 1.1.0)
          composer config minimum-stability dev
          composer config prefer-stable true
          # Old Magento releases have known advisories; installing them in throwaway CI is the point of this repo
          composer config policy.advisories.block false
          sed -i '$ s/.$//' composer.json
          echo ',"autoload":{"files": ["app/etc/NonComposerComponentRegistration.php"],"psr-0": {"": ["app/code/","generated/code/"]},"psr-4":{"Magento\\":"app/code/Magento/","Magento\\Framework\\": "lib/internal/Magento/Framework/","Magento\\Setup\\": "setup/src/Magento/Setup/", "Zend\\Mvc\\Controller\\": "setup/src/Zend/Mvc/Controller/"},"psr-0": {"": ["app/code/"]}}}' >> composer.json
          composer install
      - name: Patch legacy Magento for current dependencies
        run: |
          php .github/patches/acsd-59280-union-types.php
          php .github/patches/polyfill-framework-interfaces.php
      - name: Install Magento
        run: |
          if [ "${{ github.event.inputs.search_engine }}" = "opensearch" ]; then
            SEARCH_ARGS="--search-engine=opensearch --opensearch-host=localhost --opensearch-port=9200"
          else
            SEARCH_ARGS="--search-engine=${{ github.event.inputs.search_engine }} --elasticsearch-host=localhost --elasticsearch-port=9200"
          fi
          php bin/magento setup:install --cleanup-database --backend-frontname=admin --amqp-host=localhost --amqp-port=5672 --amqp-user=guest --amqp-password=guest  --db-host=127.0.0.1 --db-name=magento --db-user=root --db-password=123123q --session-save=files --admin-user=admin --admin-password=Welkom1234 --admin-email=admin@test.com --admin-firstname=Admin --admin-lastname=Admin $SEARCH_ARGS --magento-init-params="MAGE_MODE=developer"
          php bin/magento reach-digital:get-graphql-schema
          ls .
          cat schema.graphql
      - name: Commit sorted schema
        run: |
          npm i --no-save graphql
          node .github/scripts/sort-schema.js schema.graphql
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schema.graphql
          if git diff --cached --quiet; then
            echo "Schema identical to previous version, nothing to commit"
            exit 0
          fi
          LABEL="${{ github.event.inputs.label }}"
          [ -z "$LABEL" ] && LABEL="${{ github.event.inputs.magento_version }}"
          git commit -m "$LABEL"
          git push origin HEAD:${{ github.ref_name }}
          git tag -f "$LABEL"
          git push -f origin "refs/tags/$LABEL"